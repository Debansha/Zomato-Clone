version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: zomato_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=zomato-clone
    networks:
      - zomato_network

  redis:
    image: redis:alpine
    container_name: zomato_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - zomato_network

  server:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: zomato_api
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/zomato-clone
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=zomato_access_secret_for_dev_only
      - JWT_REFRESH_SECRET=zomato_refresh_secret_for_dev_only
      - CLIENT_URL=http://localhost:3000
      - CORS_ORIGIN=http://localhost:3000
    depends_on:
      - mongodb
      - redis
    networks:
      - zomato_network

volumes:
  mongodb_data:
  redis_data:

networks:
  zomato_network:
    driver: bridge
